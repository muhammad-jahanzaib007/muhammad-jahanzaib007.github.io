name: Backfill blog cards

# One-off maintenance: fires when .github/backfill-trigger.txt changes.
on:
  push:
    paths:
      - ".github/backfill-trigger.txt"

permissions:
  contents: write

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pillow requests

      - name: Backfill cards
        run: python automation/backfill_cards.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog blog.html sitemap.xml automation/posts.json assets/blog
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: backfill title cards for older posts"
            git push
          fi
