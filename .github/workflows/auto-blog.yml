name: Auto blog

# Publishes a new post daily at 09:00 UTC.
# Uses Claude (Anthropic API) when ANTHROPIC_API_KEY is set; else free GitHub Models.
# Also runnable on demand from the Actions tab (Run workflow).
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
  push:
    paths:
      - ".github/blog-trigger.txt"

permissions:
  contents: write
  models: read

concurrency:
  group: auto-blog
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade requests anthropic pillow

      - name: Generate post
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BLOG_MODEL: ${{ vars.BLOG_MODEL || 'openai/gpt-4o-mini' }}
          # Optional: add an ANTHROPIC_API_KEY secret to use Claude instead of free GitHub Models.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-sonnet-5' }}
        run: python automation/generate_post.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blog blog.html sitemap.xml automation/posts.json automation/topics.json assets/blog
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto blog post ($(date -u +%Y-%m-%d))"
            git push
          fi
